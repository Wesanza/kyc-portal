version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kyc_portal_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./kyc_backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./kyc_backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ./kyc_backend/.env
    environment:
      DJANGO_ENV: dev
      DB_HOST: db
      DB_PASSWORD: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./kyc_backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A celery_worker worker -l info -c 2
    volumes:
      - ./kyc_backend:/app
      - media_files:/app/media
    env_file:
      - ./kyc_backend/.env
    environment:
      DJANGO_ENV: dev
      DB_HOST: db
      DB_PASSWORD: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  media_files:
